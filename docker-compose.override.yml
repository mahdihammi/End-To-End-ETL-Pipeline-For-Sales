version: "3.8"

services:
  minio:
    image: minio/minio
    container_name: astro-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    # Add this to ensure it's on the default network
    networks:
      - airflow

  source-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: source_db
    ports:
      - "5433:5432"
    volumes:
      - source_pg_data:/var/lib/postgresql/data
      - ./include/data.csv:/tmp/data.csv
    networks:
      - airflow

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: astro-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8082:80"   # Access pgAdmin at http://localhost:8082
    depends_on:
      - source-postgres
    networks:
      - airflow

volumes:
  minio_data:
  duckdb_data:
  source_pg_data:
